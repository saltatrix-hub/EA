<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn English — Premium Workbook</title>
  <style>
    :root{
      --bg:#050913;
      --bg2:#070d1a;
      --panel:rgba(13,21,39,.72);
      --panel2:rgba(16,27,52,.86);
      --glass:rgba(18,31,60,.58);
      --line:rgba(141,168,222,.18);
      --line2:rgba(101,148,255,.42);
      --ink:#eef5ff;
      --muted:#94a3bd;
      --soft:#c7d6f4;
      --blue:#69a0ff;
      --blue2:#3468ff;
      --violet:#8d5cff;
      --cyan:#68e8ff;
      --green:#70f0a6;
      --red:#ff6c8a;
      --warn:#ffd166;
      --shadow:0 28px 90px rgba(0,0,0,.45);
      --glow:0 0 0 1px rgba(107,159,255,.38), 0 18px 58px rgba(55,104,255,.25), inset 0 1px 0 rgba(255,255,255,.08);
      --radius:26px;
      color-scheme:dark;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 2%, rgba(75,122,255,.20), transparent 32%),
        radial-gradient(circle at 82% 12%, rgba(141,92,255,.18), transparent 30%),
        radial-gradient(circle at 65% 80%, rgba(66,203,255,.11), transparent 36%),
        linear-gradient(135deg,#030711 0%,#08111f 45%,#050812 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:52px 52px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.8), rgba(0,0,0,.18));
    }
    body:after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center, transparent 0 55%, rgba(0,0,0,.36));
    }

    button,input{font:inherit}
    button{cursor:pointer}
    .app-frame{
      width:min(1680px, calc(100vw - 28px));
      margin:18px auto;
      min-height:calc(100vh - 36px);
      border:1px solid rgba(130,159,214,.22);
      border-radius:30px;
      background:linear-gradient(145deg, rgba(8,14,28,.88), rgba(6,10,19,.72));
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.05);
      display:grid;
      grid-template-columns:132px minmax(0, 1fr);
      position:relative;
      overflow:hidden;
    }
    .app-frame:before{
      content:"";
      position:absolute;
      width:780px;height:780px;
      left:170px;top:-390px;
      background:linear-gradient(135deg, rgba(50,93,255,.2), transparent 58%);
      transform:rotate(18deg);
      border-radius:90px;
      filter:blur(.2px);
      pointer-events:none;
    }
    .sidebar{
      position:sticky;
      top:18px;
      height:calc(100vh - 36px);
      padding:28px 16px;
      border-right:1px solid rgba(132,165,220,.10);
      background:linear-gradient(180deg, rgba(12,20,38,.60), rgba(9,14,26,.18));
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      z-index:4;
    }
    .brand-icon{
      width:60px;height:60px;
      display:grid;place-items:center;
      border-radius:18px;
      background:radial-gradient(circle at 50% 25%, rgba(101,156,255,.65), rgba(29,54,107,.2) 58%, transparent 70%);
      color:#dce9ff;
      font-size:29px;
      text-shadow:0 0 20px rgba(83,144,255,.9);
      margin-bottom:22px;
    }
    .nav-item{
      width:96px;
      min-height:70px;
      border:1px solid transparent;
      background:transparent;
      color:#9caccc;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:7px;
      transition:.22s ease;
    }
    .nav-item:hover,.nav-item.active{
      color:#dfeaff;
      border-color:rgba(90,146,255,.42);
      background:linear-gradient(145deg, rgba(62,108,255,.22), rgba(34,61,129,.14));
      box-shadow:0 0 35px rgba(73,123,255,.18), inset 0 1px 0 rgba(255,255,255,.09);
    }
    .nav-ico{font-size:23px;line-height:1}
    .nav-label{font-size:13px;font-weight:600;letter-spacing:.01em}
    .streak{
      margin-top:auto;
      width:96px;
      border:1px solid rgba(132,165,220,.18);
      border-radius:18px;
      background:rgba(10,17,31,.65);
      padding:15px 8px;
      text-align:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .streak strong{display:block;font-size:20px;color:#ffd58b;margin-bottom:2px}
    .streak span{font-size:12px;color:#8b99b7;font-weight:700}

    .main{
      position:relative;
      z-index:2;
      padding:64px 54px 48px;
    }
    .top-grid{
      display:grid;
      grid-template-columns:minmax(360px, .95fr) minmax(420px, .9fr);
      align-items:start;
      gap:58px;
      margin-bottom:72px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:#8cb4ff;
      text-transform:uppercase;
      font-size:12px;
      font-weight:800;
      letter-spacing:.22em;
      margin-bottom:18px;
    }
    .eyebrow:before{content:"";width:34px;height:1px;background:linear-gradient(90deg,var(--blue),transparent)}
    .title{
      font-family: Georgia, "Times New Roman", serif;
      font-weight:800;
      font-size:clamp(64px, 6.2vw, 116px);
      line-height:.86;
      letter-spacing:-.055em;
      margin:0 0 26px;
      color:#dce8ff;
      text-shadow:0 0 36px rgba(88,137,255,.28);
      position:relative;
    }
    .title .spark{
      display:inline-block;
      color:#5b93ff;
      font-size:.34em;
      transform:translate(-.1em,-1.4em);
      text-shadow:0 0 28px rgba(89,144,255,.88);
    }
    .subtitle{
      max-width:560px;
      color:#9caac4;
      font-size:18px;
      line-height:1.75;
      margin:0 0 30px;
    }
    .hero-actions{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .pill-btn{
      border:1px solid rgba(130,166,230,.20);
      color:#b8c9ee;
      background:linear-gradient(135deg, rgba(24,40,72,.68), rgba(9,17,33,.78));
      padding:14px 20px;
      border-radius:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      display:inline-flex;gap:10px;align-items:center;
      transition:.2s ease;
    }
    .pill-btn:hover{border-color:rgba(100,157,255,.58); color:#fff; transform:translateY(-1px)}
    .student-input{
      min-width:230px;
      color:#eaf2ff;
      border:1px solid rgba(130,166,230,.18);
      border-radius:14px;
      background:rgba(8,15,30,.56);
      padding:14px 16px;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .student-input:focus{border-color:rgba(105,160,255,.55); box-shadow:0 0 0 4px rgba(105,160,255,.08)}

    .progress-card{
      justify-self:end;
      width:min(650px, 100%);
      min-height:235px;
      border-radius:28px;
      border:1px solid rgba(149,178,235,.20);
      background:
        radial-gradient(circle at 83% 22%, rgba(95,144,255,.20), transparent 22%),
        linear-gradient(145deg, rgba(24,37,70,.74), rgba(11,18,34,.62));
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.08);
      padding:40px 42px;
      position:relative;
      overflow:hidden;
    }
    .progress-card:before{
      content:"";
      position:absolute;left:0;right:0;bottom:-30px;height:110px;
      background:
        radial-gradient(ellipse at 75% 10%, rgba(77,124,255,.23), transparent 35%),
        linear-gradient(170deg, transparent 30%, rgba(54,102,255,.18) 31% 33%, transparent 34% 100%);
      opacity:.9;
    }
    .crystal{
      position:absolute;right:38px;top:38px;
      width:58px;height:58px;
      display:grid;place-items:center;
      color:#75cdff;
      filter:drop-shadow(0 0 18px rgba(100,182,255,.65));
    }
    .progress-title{font-size:18px;font-weight:800;color:#d7e3ff;margin-bottom:28px}
    .progress-track{
      height:16px;border-radius:999px;
      background:rgba(37,50,85,.86);
      overflow:hidden;
      box-shadow:inset 0 1px 2px rgba(0,0,0,.5);
      position:relative;
    }
    .progress-fill{
      height:100%;width:0%;border-radius:inherit;
      background:linear-gradient(90deg, #65a3ff, #426bff 45%, #9f5dff);
      box-shadow:0 0 25px rgba(100,150,255,.72);
      transition:.35s ease;
    }
    .progress-fill:after{
      content:"";display:block;width:130px;height:100%;margin-left:auto;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
      opacity:.45;
    }
    .progress-meta{
      position:relative;
      display:flex;align-items:center;justify-content:space-between;
      margin-top:22px;
      color:#aebcdb;font-size:17px;font-weight:600;
    }
    .progress-meta strong{color:#eef5ff;font-size:22px}

    .layout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 490px;
      gap:48px;
      align-items:start;
    }
    .toolbar{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:24px;
      flex-wrap:wrap;
    }
    .search-wrap{
      flex:1;min-width:280px;position:relative;
    }
    .search-wrap span{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#7586aa}
    .search{
      width:100%;
      border:1px solid rgba(130,166,230,.15);
      border-radius:18px;
      padding:16px 18px 16px 48px;
      color:#e8f0ff;
      background:rgba(8,15,30,.62);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .search:focus{border-color:rgba(105,160,255,.56); box-shadow:0 0 0 4px rgba(105,160,255,.08)}
    .mini-actions{display:flex;gap:12px;align-items:center}
    .ghost-btn{
      border:1px solid rgba(130,166,230,.18);
      color:#9fb2d9;
      border-radius:15px;
      padding:14px 16px;
      background:rgba(12,20,38,.5);
      transition:.2s ease;
    }
    .ghost-btn:hover{color:#fff;border-color:rgba(101,160,255,.48);background:rgba(28,46,88,.58)}

    .level-section{margin-bottom:42px}
    .section-head{
      display:grid;
      grid-template-columns:auto auto 1fr auto;
      align-items:center;
      gap:16px;
      margin:10px 0 22px;
    }
    .level-badge{
      padding:8px 14px;
      border-radius:10px;
      background:linear-gradient(135deg, rgba(67,113,255,.35), rgba(44,70,143,.20));
      color:#a9c2ff;
      font-weight:900;
      border:1px solid rgba(89,145,255,.26);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
    }
    .section-title{
      text-transform:uppercase;
      letter-spacing:.18em;
      color:#a9b8d8;
      font-size:14px;
      font-weight:900;
      white-space:nowrap;
    }
    .section-line{height:1px;background:linear-gradient(90deg, rgba(160,184,230,.3), transparent)}
    .section-count{color:#7f8fad;font-size:13px;font-weight:700}
    .cards-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(150px, 1fr));
      gap:24px;
    }
    .level-card{
      position:relative;
      min-height:230px;
      border-radius:24px;
      border:1px solid rgba(135,166,224,.14);
      background:
        linear-gradient(180deg, rgba(18,30,56,.62), rgba(8,15,29,.72));
      color:#8fa0c0;
      padding:24px 18px 20px;
      text-align:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.035), 0 18px 50px rgba(0,0,0,.25);
      overflow:hidden;
      transition:.22s ease;
    }
    .level-card:before{
      content:"";
      position:absolute;inset:auto 0 0 0;height:64px;
      background:radial-gradient(ellipse at 35% 100%, rgba(57,104,255,.28), transparent 58%), radial-gradient(ellipse at 70% 100%, rgba(101,232,255,.14), transparent 60%);
      opacity:.62;
    }
    .level-card:hover:not(.is-locked){transform:translateY(-4px);border-color:rgba(103,160,255,.48);color:#dce8ff}
    .level-card.is-active{
      border-color:rgba(103,160,255,.9);
      box-shadow:var(--glow);
      background:linear-gradient(180deg, rgba(25,45,88,.82), rgba(10,18,35,.78));
    }
    .level-card.is-locked{opacity:.62;cursor:not-allowed}
    .level-card.is-done{border-color:rgba(112,240,166,.35)}
    .lock{position:absolute;right:18px;top:18px;color:#a6b0c4;opacity:.7}
    .done-icon{position:absolute;right:18px;top:18px;color:var(--green);text-shadow:0 0 18px rgba(112,240,166,.5)}
    .card-num{
      font-family:Georgia,"Times New Roman",serif;
      font-size:66px;
      line-height:1;
      color:#527fd6;
      font-weight:900;
      text-shadow:0 0 24px rgba(69,111,220,.25);
      margin:10px 0 22px;
      position:relative;
      z-index:1;
    }
    .card-title{
      min-height:52px;
      display:flex;align-items:center;justify-content:center;
      font-size:17px;font-weight:800;line-height:1.45;
      color:#d6e2fb;
      position:relative;z-index:1;
    }
    .card-sub{font-size:12px;color:#7e8eae;margin-top:10px;position:relative;z-index:1}
    .stars{color:#d5def4;letter-spacing:4px;font-size:15px;margin-top:20px;position:relative;z-index:1}
    .is-locked .stars{color:#59677f}

    .lesson-panel{
      position:sticky;
      top:38px;
      border:1px solid rgba(141,168,222,.18);
      border-radius:28px;
      background:
        radial-gradient(circle at 100% 0%, rgba(80,126,255,.12), transparent 35%),
        linear-gradient(180deg, rgba(15,26,50,.80), rgba(7,13,25,.82));
      box-shadow:0 28px 80px rgba(0,0,0,.36), inset 0 1px 0 rgba(255,255,255,.06);
      padding:34px;
      overflow:hidden;
    }
    .lesson-panel h2{
      font-family:Georgia,"Times New Roman",serif;
      font-size:30px;
      line-height:1.2;
      color:#dce8ff;
      margin:14px 0 14px;
    }
    .panel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px}
    .panel-label{color:#cbd8f4;font-size:18px;font-weight:700;font-family:Georgia,"Times New Roman",serif}
    .level-pill{padding:9px 14px;border-radius:13px;color:#93bbff;background:rgba(40,76,160,.30);font-weight:800;border:1px solid rgba(103,160,255,.22);white-space:nowrap}
    .goal{color:#98a8c6;line-height:1.8;margin:0 0 28px;font-size:15.5px}
    .timeline{display:grid;gap:13px;margin:24px 0 28px;position:relative}
    .timeline:before{content:"";position:absolute;left:25px;top:42px;bottom:42px;width:2px;background:linear-gradient(var(--blue2), rgba(107,159,255,.05))}
    .step{
      display:grid;
      grid-template-columns:52px 1fr auto;
      gap:15px;align-items:center;
      padding:16px;
      border-radius:17px;
      background:rgba(20,33,62,.56);
      border:1px solid rgba(141,168,222,.08);
      position:relative;
    }
    .step:first-child{background:linear-gradient(135deg, rgba(46,70,150,.45), rgba(20,33,62,.62))}
    .step-ico{
      width:52px;height:52px;border-radius:14px;
      display:grid;place-items:center;
      color:#86aaff;background:rgba(56,88,178,.28);
      font-size:22px;z-index:1;
    }
    .step h4{margin:0 0 4px;color:#d5e0f5;font-size:15px}
    .step p{margin:0;color:#8e9db9;font-size:13px;line-height:1.35}
    .step-time{color:#8d9ab3;font-weight:800;font-size:13px;white-space:nowrap}
    .start-btn,.primary-btn{
      width:100%;
      border:1px solid rgba(126,166,255,.65);
      color:#ecf4ff;
      background:linear-gradient(135deg, rgba(71,108,255,.90), rgba(113,82,237,.78));
      box-shadow:0 0 0 1px rgba(157,185,255,.10), 0 18px 45px rgba(74,103,255,.32), inset 0 1px 0 rgba(255,255,255,.18);
      border-radius:18px;
      padding:18px 20px;
      font-weight:900;
      transition:.22s ease;
    }
    .start-btn:hover,.primary-btn:hover{transform:translateY(-2px);filter:brightness(1.07)}
    .start-btn:disabled,.primary-btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5);transform:none}

    .workspace{
      margin-top:58px;
      border:1px solid rgba(141,168,222,.16);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(12,22,42,.72), rgba(7,12,23,.76));
      box-shadow:0 28px 80px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.05);
      padding:36px;
    }
    .workspace-head{
      display:flex;align-items:flex-start;justify-content:space-between;gap:24px;
      padding-bottom:24px;
      border-bottom:1px solid rgba(141,168,222,.12);
      margin-bottom:28px;
    }
    .workspace-head h2{font-size:34px;margin:8px 0 8px;font-family:Georgia,"Times New Roman",serif;color:#e8f0ff}
    .workspace-head p{margin:0;color:#9aa9c5;line-height:1.7;max-width:780px}
    .tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .tag{border:1px solid rgba(130,166,230,.16);color:#9fb7e9;background:rgba(15,26,50,.52);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}
    .content-grid{display:grid;grid-template-columns:repeat(12, 1fr);gap:22px}
    .content-card{
      border:1px solid rgba(141,168,222,.13);
      border-radius:24px;
      background:rgba(9,17,32,.62);
      padding:24px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
    }
    .content-card h3{margin:0 0 16px;color:#e2ebff;font-size:20px}
    .content-card p{color:#a1b0cc;line-height:1.75;margin:0 0 12px}
    .span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-12{grid-column:span 12}
    .objective-list{display:grid;gap:10px;padding:0;margin:0;list-style:none}
    .objective-list li{display:flex;gap:10px;align-items:flex-start;color:#aebbd4;line-height:1.5}
    .objective-list li:before{content:"✦";color:#77a6ff}
    .formula-list,.vocab-grid,.drill-grid{display:grid;gap:14px}
    .formula-list{grid-template-columns:repeat(5, minmax(120px, 1fr))}
    .formula,.vocab,.drill,.question{
      border:1px solid rgba(141,168,222,.11);
      background:linear-gradient(180deg, rgba(18,30,56,.58), rgba(10,18,34,.58));
      border-radius:18px;
      padding:16px;
    }
    .formula{color:#dbe7ff;font-weight:900;text-align:center}
    .vocab-grid{grid-template-columns:repeat(4, minmax(150px, 1fr))}
    .vocab-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
    .vocab strong{font-size:18px;color:#eef5ff}
    .vocab .tr{color:#88a0c6;font-size:13px;margin-top:4px}
    .vocab .ex{color:#bac8e4;font-size:13px;line-height:1.55;margin-top:10px}
    .speak-btn{
      width:38px;height:38px;display:grid;place-items:center;
      flex:0 0 auto;
      border:1px solid rgba(105,160,255,.28);
      color:#9ec3ff;
      border-radius:12px;
      background:rgba(50,83,164,.22);
      transition:.18s ease;
    }
    .speak-btn:hover{color:#fff;background:rgba(80,124,235,.35)}
    .dialogue{display:grid;gap:13px}
    .bubble{display:flex;gap:12px;align-items:flex-start;border-radius:18px;padding:15px;background:rgba(17,29,54,.58);border:1px solid rgba(141,168,222,.10)}
    .speaker{width:36px;height:36px;border-radius:12px;background:rgba(87,132,255,.25);display:grid;place-items:center;color:#bcd2ff;font-weight:900;flex:0 0 auto}
    .bubble p{margin:0;color:#cad7ef}
    .reading-box{background:rgba(12,22,42,.58);border:1px solid rgba(141,168,222,.10);border-radius:18px;padding:18px;color:#c6d4ee;line-height:1.75}
    .answer{display:none;margin-top:12px;padding:14px;border-radius:14px;background:rgba(112,240,166,.10);border:1px solid rgba(112,240,166,.22);color:#bdfad5}
    .answer.show{display:block}
    .show-answer{border:1px solid rgba(130,166,230,.18);border-radius:12px;color:#a9c1f4;background:rgba(18,30,56,.6);padding:10px 12px;font-size:13px;font-weight:800;margin-top:10px}
    .show-answer:hover{border-color:rgba(105,160,255,.48);color:#fff}
    .drill-grid{grid-template-columns:repeat(2, minmax(220px, 1fr))}
    .drill b{color:#dbe5fb;line-height:1.55;display:block}
    .quiz-head{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}
    .quiz-head p{margin:0;color:#96a7c4}.quiz-head strong{color:#eaf2ff}
    .question{margin-bottom:14px}
    .question h4{margin:0 0 14px;color:#dbe7ff;font-size:16px;line-height:1.5}

      { key:"A2", title:"A2 — GÜNLÜK HAYAT", range:[17,24] },
      { key:"A2", title:"A2 — GEÇİŞ & TEKRAR", range:[25,30] }
    ];

    let state = loadState();
    let currentId = Math.min(state.currentId || 1, COURSE.length);
    let voices = [];
    const el = {
      levelSections: document.getElementById("levelSections"),
      lessonPanel: document.getElementById("lessonPanel"),
      workspace: document.getElementById("workspace"),
      doneCount: document.getElementById("doneCount"),
      percentCount: document.getElementById("percentCount"),
      progressFill: document.getElementById("progressFill"),
      search: document.getElementById("search"),
      studentName: document.getElementById("studentName"),
      toast: document.getElementById("toast")
    };

    el.studentName.value = localStorage.getItem(NAME_KEY) || "";
    el.studentName.addEventListener("input", () => {
      localStorage.setItem(NAME_KEY, el.studentName.value.trim());
      renderWorkspace();
    });
    el.search.addEventListener("input", renderLevelSections);

    document.addEventListener("click", (event) => {
      const card = event.target.closest("[data-level]");
      if (card) return selectLevel(Number(card.dataset.level));

      const scroll = event.target.closest("[data-scroll]");
      if (scroll) return scrollToArea(scroll.dataset.scroll);

      const speak = event.target.closest("[data-speak]");
      if (speak) return speakEnglish(speak.dataset.speak);

      const show = event.target.closest("[data-answer]");
      if (show) return toggleAnswer(show);

      const start = event.target.closest("[data-start]");
      if (start) return startLesson();

      const check = event.target.closest("[data-check-quiz]");
      if (check) return checkQuiz(Number(check.dataset.checkQuiz));

      const clear = event.target.closest("[data-clear-quiz]");
      if (clear) return clearQuiz();

      const next = event.target.closest("[data-next]");
      if (next) return goNext();
    });

    document.getElementById("readEnglish").addEventListener("click", () => {
      const lesson = getCurrentLesson();
      const text = [
        "Hello. Welcome to your English lesson.",
        ...lesson.formulas.slice(0, 4).map(getEnglishSpeechText),
        lesson.reading.text
      ].join(" ");
      speakEnglish(text);
    });
    document.getElementById("printPage").addEventListener("click", () => window.print());
    document.getElementById("clearSearch").addEventListener("click", () => { el.search.value = ""; renderLevelSections(); });
    document.getElementById("resetProgress").addEventListener("click", () => {
      if (confirm("Tüm ilerleme sıfırlansın mı?")) {
        localStorage.removeItem(STORAGE_KEY);
        state = loadState();
        currentId = 1;
        renderAll();
        showToast("İlerleme sıfırlandı.", "bad");
      }
    });

    if ("speechSynthesis" in window) {
      voices = window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => voices = window.speechSynthesis.getVoices();
    }

    function loadState(){
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { unlocked:1, passed:{}, scores:{}, currentId:1 }; }
      catch(e){ return { unlocked:1, passed:{}, scores:{}, currentId:1 }; }
    }
    function saveState(){
      state.currentId = currentId;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function getCurrentLesson(){ return COURSE.find(x => x.id === currentId) || COURSE[0]; }
    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function escapeAttr(value){ return escapeHtml(value).replaceAll("`", "&#096;"); }
    function displayTitle(lesson){
      const special = {
        1:"Merhaba & Tanışma", 2:"I / You / He / She", 3:"Sayılar & Yaş", 4:"A / An + This / That",
        5:"Aile & Have", 6:"Renkler & Tarif", 7:"Günlük Rutin 1", 8:"Günlük Rutin 2",
        9:"Saat & Günler", 10:"Yiyecek & İçecek", 11:"Places", 12:"Directions", 13:"Can / Can't", 14:"Şu An", 15:"Hava & Kıyafet"
      };
      if (special[lesson.id]) return special[lesson.id];
      return lesson.title.replace(/^[^:]{1,32}:\s*/, "").trim();
    }
    function sectionLessons(def){ return COURSE.filter(l => l.id >= def.range[0] && l.id <= def.range[1]); }
    function isLocked(lesson){ return lesson.id > state.unlocked; }
    function isDone(lesson){ return !!state.passed[lesson.id]; }

    function getEnglishSpeechText(text){
      const value = String(text || "").trim();
      if (!value) return "";

      // Kalıp kutusunda metinler şu formatta: "My name is Ayşe. = Benim adım Ayşe."
      // Sesli okuma için sadece eşittirin SOL tarafını okutuyoruz.
      // Böylece Türkçe açıklamalar İngilizce/Türkçe karışık okunmaz.
      return value
        .split("=")[0]
        .replace(/\s+/g, " ")
        .trim();
    }

    function getEnglishVoice(){
      voices = window.speechSynthesis.getVoices() || voices || [];

      const preferredNames = [
        /Google US English/i,
        /Google UK English/i,
        /Microsoft Aria.*English/i,
        /Microsoft Jenny.*English/i,
        /Microsoft Zira.*English/i,
        /Microsoft David.*English/i,
        /Samantha/i,
        /Daniel/i,
        /Karen/i,
        /Alex/i
      ];

      return voices.find(v => preferredNames.some(rx => rx.test(v.name)))
        || voices.find(v => /^en[-_](US|GB)$/i.test(v.lang))
        || voices.find(v => /^en[-_]/i.test(v.lang))
        || null;
    }

    function speakEnglish(text){
      if (!("speechSynthesis" in window)) { showToast("Bu tarayıcı sesli okuma desteklemiyor.", "bad"); return; }

      const cleanText = getEnglishSpeechText(text);
      if (!cleanText) return;

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(cleanText);
      const englishVoice = getEnglishVoice();

      // En kritik kısım: voice + lang ikisini birlikte İngilizceye sabitliyoruz.
      if (englishVoice) {
        utter.voice = englishVoice;
        utter.lang = englishVoice.lang || "en-US";
      } else {
        utter.lang = "en-US";
        showToast("Tarayıcıda İngilizce ses bulunamadı. Cihaz ayarlarından English voice eklemen gerekebilir.", "bad");
      }

      utter.rate = 0.82;
      utter.pitch = 1;
      window.speechSynthesis.speak(utter);
    }

    function renderStats(){
      const done = Object.keys(state.passed || {}).length;
      const percent = Math.round((done / COURSE.length) * 100);
      el.doneCount.textContent = done;
      el.percentCount.textContent = percent + "%";
      el.progressFill.style.width = percent + "%";
    }

    function renderLevelSections(){
      const query = el.search.value.trim().toLowerCase();
      let html = "";
      sectionDefs.forEach(def => {
        let lessons = sectionLessons(def).filter(lesson => {
          const hay = [lesson.title, displayTitle(lesson), lesson.band, lesson.goal, ...lesson.objectives, ...lesson.formulas, ...lesson.vocab.map(v => v.en + " " + v.tr)].join(" ").toLowerCase();
          return !query || hay.includes(query);
        });
        if (!lessons.length) return;
        html += `
          <section class="level-section">
            <div class="section-head">
              <span class="level-badge">${escapeHtml(def.key)}</span>
              <span class="section-title">${escapeHtml(def.title)}</span>
              <span class="section-line"></span>
              <span class="section-count">${lessons.length} ders</span>
            </div>
            <div class="cards-grid">
              ${lessons.map(renderLevelCard).join("")}
            </div>
          </section>`;
      });
      el.levelSections.innerHTML = html || `<div class="content-card"><h3>Sonuç yok</h3><p>Başka bir kelimeyle ara.</p></div>`;
    }

    function renderLevelCard(lesson){
      const locked = isLocked(lesson);
      const done = isDone(lesson);
      const active = lesson.id === currentId;
      return `
        <button class="level-card ${active ? "is-active" : ""} ${locked ? "is-locked" : ""} ${done ? "is-done" : ""}" data-level="${lesson.id}" aria-label="${escapeAttr(displayTitle(lesson))}">
          ${locked ? `<span class="lock">🔒</span>` : done ? `<span class="done-icon">✓</span>` : ""}
          <div class="card-num">${done ? "✓" : lesson.id}</div>
          <div class="card-title">${escapeHtml(displayTitle(lesson))}</div>
          <div class="card-sub">${escapeHtml(lesson.minutes)} · ${escapeHtml(lesson.band)}</div>
          <div class="stars">${done ? "★ ★ ★" : "☆ ☆ ☆"}</div>
        </button>`;
    }

    function renderPanel(){
      const lesson = getCurrentLesson();
      const locked = isLocked(lesson);
      const done = isDone(lesson);
      const score = state.scores?.[lesson.id];
      el.lessonPanel.innerHTML = `
        <div class="panel-top">
          <div class="panel-label">Konu Başlığı</div>
          <div class="level-pill">A${lesson.id <= 16 ? "1" : "2"} — Seviye ${lesson.id}</div>
        </div>
        <h2>${escapeHtml(displayTitle(lesson))}</h2>
        <p class="goal">${escapeHtml(lesson.goal)}</p>
        ${done ? `<div class="answer show" style="display:block;margin-bottom:20px">Bu bölüm tamamlandı. Son skor: <b>${score || lesson.final.length}/${lesson.final.length}</b></div>` : ""}
        <div class="timeline">
          <div class="step"><div class="step-ico">▤</div><div><h4>Konu Anlatımı</h4><p>Kısa, net ve seviye odaklı anlatım</p></div><div class="step-time">10 dk</div></div>
          <div class="step"><div class="step-ico">◉</div><div><h4>Pratik Yap</h4><p>Kelime, cümle ve konuşma pratiği</p></div><div class="step-time">15 dk</div></div>
          <div class="step"><div class="step-ico">✎</div><div><h4>Konu Testi</h4><p>Öğrendiklerini pekiştir</p></div><div class="step-time">10 dk</div></div>
          <div class="step"><div class="step-ico">🏆</div><div><h4>Final Testi</h4><p>10/10 ile sonraki seviyeyi aç</p></div><div class="step-time">15 dk</div></div>
        </div>
        <button class="start-btn" data-start ${locked ? "disabled" : ""}>${locked ? "Kilitli Seviye" : "Derse Başla"} →</button>
      `;
    }

    function renderWorkspace(){
      const lesson = getCurrentLesson();
      if (isLocked(lesson)) {
        el.workspace.innerHTML = `<div class="workspace-head"><div><span class="level-badge">Kilitli</span><h2>${escapeHtml(displayTitle(lesson))}</h2><p>Bu seviyeyi açmak için önceki bölüm testinden tam puan almalısın.</p></div></div>`;
        return;
      }
      const student = localStorage.getItem(NAME_KEY) || "öğrenci";
      const vocabHtml = lesson.vocab.map(v => `
        <div class="vocab" id="vocab">
          <div class="vocab-head">
            <div><strong>${escapeHtml(v.en)}</strong><div class="tr">${escapeHtml(v.tr)}</div></div>
            <button class="speak-btn" data-speak="${escapeAttr(v.en + ". " + v.ex)}" title="English voice">🔊</button>
          </div>
          <div class="ex">${escapeHtml(v.ex)}</div>
        </div>`).join("");
      const dialogueHtml = lesson.dialogue.map(d => `
        <div class="bubble">
          <div class="speaker">${escapeHtml(d.speaker).slice(0,2)}</div>
          <p><b>${escapeHtml(d.speaker)}:</b> ${escapeHtml(d.line)} <button class="speak-btn" data-speak="${escapeAttr(d.line)}" title="English voice">🔊</button></p>
        </div>`).join("");
      const drillsHtml = lesson.drills.map((d, i) => `
        <div class="drill">
          <b>${i+1}. ${escapeHtml(d.task)}</b>
          <button class="show-answer" data-answer>Cevabı göster</button>
          <div class="answer">${escapeHtml(d.answer)}</div>
        </div>`).join("");
      const questionsHtml = lesson.final.map((item, qi) => `
        <div class="question" data-question="${qi}">
          <h4>${qi+1}. ${escapeHtml(item.q)}</h4>
          <div class="options">
            ${item.options.map((opt, oi) => `
              <label class="option" data-option="${oi}">
                <input type="radio" name="q_${lesson.id}_${qi}" value="${oi}">
                <span>${escapeHtml(opt)}</span>
              </label>`).join("")}
          </div>
        </div>`).join("");
      el.workspace.innerHTML = `
        <div class="workspace-head">
          <div>
            <span class="level-badge">Level ${lesson.id} / ${COURSE.length}</span>
            <h2>${escapeHtml(displayTitle(lesson))}</h2>
            <p>Merhaba <b>${escapeHtml(student)}</b>. Bu bölümde hedef; ezber yapmadan, kısa ve anlaşılır İngilizce kalıplarını kullanabilmek.</p>
            <div class="tag-row">
              <span class="tag">${escapeHtml(lesson.band)}</span>
              <span class="tag">⏱ ${escapeHtml(lesson.minutes)}</span>
              <span class="tag">${lesson.final.length} soruluk test</span>
              <span class="tag">English Voice</span>
            </div>
          </div>
          <button class="pill-btn" data-speak="${escapeAttr(lesson.reading.text)}"><span>🔊</span><span>Read in English</span></button>
        </div>
        <div class="content-grid">
          <section class="content-card span-4">
            <h3>🎯 Bugünün Hedefleri</h3>
            <ul class="objective-list">${lesson.objectives.map(o => `<li>${escapeHtml(o)}</li>`).join("")}</ul>
          </section>
          <section class="content-card span-8">
            <h3>📘 Konu Anlatımı</h3>
            ${lesson.explain.map(p => `<p>${escapeHtml(p)}</p>`).join("")}
          </section>
          <section class="content-card span-12">
            <h3>🧩 Kalıp Kutusu</h3>
            <div class="formula-list">${lesson.formulas.map(f => `<button class="formula" data-speak="${escapeAttr(getEnglishSpeechText(f))}">${escapeHtml(f)}</button>`).join("")}</div>
          </section>
          <section class="content-card span-12" id="vocab-section">
            <h3>🔤 Kelime Kartları</h3>
            <p class="small">Hoparlöre basınca metin özellikle İngilizce sesle okunur.</p>
            <div class="vocab-grid">${vocabHtml}</div>
          </section>
          <section class="content-card span-6">
            <h3>💬 Mini Diyalog</h3>
            <div class="dialogue">${dialogueHtml}</div>
          </section>
          <section class="content-card span-6">
            <h3>📖 Kısa Okuma</h3>
            <div class="reading-box">
              <button class="pill-btn" data-speak="${escapeAttr(lesson.reading.text)}" style="margin-bottom:14px">🔊 Read in English</button>
              <p>${escapeHtml(lesson.reading.text)}</p>
              <p><b>Soru:</b> ${escapeHtml(lesson.reading.question)}</p>
              <button class="show-answer" data-answer>Cevabı göster</button>
              <div class="answer">${escapeHtml(lesson.reading.answer)}</div>
            </div>
          </section>
          <section class="content-card span-5">
            <h3>✍️ Bölüm İçi Pratik</h3>
            <p class="small">Bunlar ısınma alıştırmaları. Ana kilidi bölüm sonu testi açar.</p>
            <div class="drill-grid">${drillsHtml}</div>
          </section>
          <section class="content-card span-7" id="test-area">
            <div class="quiz-head"><div><h3>🏁 Bölüm Sonu Testi</h3><p>Sonraki seviyeye geçmek için <strong>${lesson.final.length}/${lesson.final.length}</strong> yapmalısın.</p></div></div>
            <form id="quizForm">${questionsHtml}</form>
            <div id="result" class="result"></div>
            <div class="sticky-actions">
              <button type="button" class="action-btn primary" data-check-quiz="${lesson.id}">Testi Kontrol Et</button>
              <button type="button" class="action-btn" data-clear-quiz>Testi Temizle</button>
              <button type="button" class="action-btn" onclick="window.print()">Yazdır / PDF</button>
              <button type="button" class="action-btn primary" data-next ${state.unlocked > lesson.id ? "" : "disabled"}>Sonraki Bölüm →</button>
            </div>
          </section>
        </div>`;
    }

    function selectLevel(id){
      const lesson = COURSE.find(x => x.id === id);
      if (!lesson) return;
      if (isLocked(lesson)) {
        currentId = id;
        renderLevelSections();
        renderPanel();
        renderWorkspace();
        showToast("Bu seviye kilitli. Önce önceki bölüm testinden tam puan almalısın.", "bad");
        return;
      }
      currentId = id;
      saveState();
      renderAll();
    }
    function startLesson(){
      const lesson = getCurrentLesson();
      if (isLocked(lesson)) return showToast("Bu seviye kilitli.", "bad");
      document.getElementById("workspace").scrollIntoView({ behavior:"smooth", block:"start" });
    }
    function toggleAnswer(button){
      const answer = button.parentElement.querySelector(".answer") || button.nextElementSibling;
      if (answer) answer.classList.toggle("show");
    }
    function checkQuiz(lessonId){
      const lesson = COURSE.find(x => x.id === lessonId);
      if (!lesson) return;
      let score = 0;
      lesson.final.forEach((item, qi) => {
        const question = document.querySelector(`.question[data-question="${qi}"]`);
        if (!question) return;
        const selected = question.querySelector(`input[name="q_${lesson.id}_${qi}"]:checked`);
        const chosen = selected ? Number(selected.value) : -1;
        question.querySelectorAll(".option").forEach(opt => {
          opt.classList.remove("correct", "wrong");
          const idx = Number(opt.dataset.option);
          if (idx === item.answer) opt.classList.add("correct");
          if (idx === chosen && chosen !== item.answer) opt.classList.add("wrong");
        });
        if (chosen === item.answer) score++;
      });
      const result = document.getElementById("result");
      const max = lesson.final.length;
      result.className = "result show " + (score === max ? "ok" : "bad");
      if (score === max) {
        state.passed[lesson.id] = true;
        state.scores[lesson.id] = score;
        state.unlocked = Math.max(state.unlocked || 1, Math.min(COURSE.length, lesson.id + 1));
        saveState();
        result.innerHTML = `Mükemmel: ${score}/${max}. Sonraki seviye açıldı.`;
        showToast("Tebrikler! Sonraki seviye açıldı.", "ok");
      } else {
        state.scores[lesson.id] = score;
        saveState();
        result.innerHTML = `Skor: ${score}/${max}. Sonraki seviye için tam puan gerekli. Yanlışları inceleyip tekrar dene.`;
        showToast(`Skor: ${score}/${max}. Tam puan gerekiyor.`, "bad");
      }
      renderStats();
      renderLevelSections();
      renderPanel();
      const nextButton = document.querySelector("[data-next]");
      if (nextButton && state.unlocked > lesson.id) nextButton.disabled = false;
    }
    function clearQuiz(){
      document.querySelectorAll("#quizForm input").forEach(i => i.checked = false);
      document.querySelectorAll("#quizForm .option").forEach(o => o.classList.remove("correct", "wrong"));
      const result = document.getElementById("result");
      if (result) { result.className = "result"; result.innerHTML = ""; }
    }
    function goNext(){
      if (currentId < COURSE.length && state.unlocked > currentId) {
        currentId++;
        saveState();
        renderAll();
        document.getElementById("levels").scrollIntoView({ behavior:"smooth", block:"start" });
      } else if (currentId >= COURSE.length) {
        showToast("Tüm seviyeler tamamlandı.", "ok");
      } else {
        showToast("Önce bu bölüm testinden tam puan almalısın.", "bad");
      }
    }
    function scrollToArea(area){
      const map = { top:"top", levels:"levels", workspace:"workspace", progress:"progress", vocab:"vocab-section" };
      const target = document.getElementById(map[area] || area);
      if (target) target.scrollIntoView({ behavior:"smooth", block:"start" });
    }
    let toastTimer;
    function showToast(message, type="ok"){
      clearTimeout(toastTimer);
      el.toast.textContent = message;
      el.toast.className = "toast show " + type;
      toastTimer = setTimeout(() => el.toast.className = "toast", 3200);
    }
    function renderAll(){ renderStats(); renderLevelSections(); renderPanel(); renderWorkspace(); }
    renderAll();
  </script>
</body>
</html>
